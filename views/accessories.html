<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Accessories | Mangalmurti Mobile Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  background:#020c1b;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
}

.header h1{
  font-size:42px;
  font-weight:900;
  color:#00e5ff;
}

.header p{
  color:#cbd5e1;
}

/* FILTER */
#filter-bar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

#filter-bar button{
  padding:8px 18px;
  border:none;
  border-radius:20px;
  background:#e5e7eb;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

#filter-bar button:hover{
  background:#00e5ff;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  padding:18px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:hover{
  transform:translateY(-6px);
}

/* IMAGE */
.card img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#f1f5f9;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

/* TEXT */
.card h3{
  color:black;
  font-size:16px;
  margin:10px 0;
}

.price{
  color:#16a34a;
  font-weight:bold;
  margin-bottom:10px;
}

/* BUTTON */
.cart-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.cart-btn:hover{
  background:#00e5ff;
  color:black;
}

/* CART ICON */
#cart-icon{
  position:fixed;
  top:20px;
  right:20px;
  background:#00e5ff;
  color:black;
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

#cart-count{
  background:red;
  color:white;
  padding:2px 6px;
  border-radius:50%;
  margin-left:5px;
}

/* CART MODAL */
#cart-modal{
  position:fixed;
  top:0;
  right:-100%;
  width:320px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:0.4s;
}

#cart-modal.active{
  right:0;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

.cart-item{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.remove-btn{
  background:red;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
  cursor:pointer;
}

/* TOAST POPUP */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00e5ff;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  font-weight:600;
  opacity:0;
  transform:translateY(50px);
  transition:0.4s;
  z-index:999;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
  .header h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="header">
   <h1>Mobile Accessories</h1>
   <p>Fast Chargers • Cables • Earbuds • Speakers</p>
</div>

<div id="filter-bar">
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Charger')">Charger</button>
<button onclick="filterCategory('Earbuds')">Earbuds</button>
<button onclick="filterCategory('Speaker')">Speakers</button>
</div>

<div class="grid" id="product-grid"></div>

<!-- CART -->
<div id="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

<div id="cart-modal">
  <span class="close-btn" onclick="toggleCart()">✖</span>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

const products = [
{category:"Charger",name:"Vivo 44W Charger",price:300,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170452/b1_g0tnpd.jpg"},
{category:"Charger",name:"V25 Pro 80W Charger",price:400,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170453/b2_cmhkw7.jpg"},
{category:"Charger",name:"V30 Pro 120W Charger",price:700,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170456/b3_v9iwjs.jpg"},
{category:"Charger",name:"Realme 33W SuperDart",price:700,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170461/b4_u3vcd2.jpg"},
{category:"Charger",name:"Realme 45W SuperVooc",price:600,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170470/b5_c8pgb3.jpg"},
{category:"Charger",name:"Oppo 100W Charger",price:400,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170473/b6_dzgtrp.jpg"},
{category:"Charger",name:"Nothing 33W CMF",price:890,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170479/b7_tyjv7a.jpg"},
{category:"Charger",name:"Nothing 65W CMF",price:550,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170481/b8_otqleu.jpg"},
{category:"Charger",name:"Mi 27W Charger",price:180,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170485/b9_eh1mlo.jpg"},
{category:"Charger",name:"Mi 67W + Cable",price:300,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170487/b10_zjgjtv.jpg"},
{category:"Charger",name:"Mi 120W Combo",price:500,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170488/b11_w5t0eb.jpg"},
{category:"Charger",name:"OnePlus 65W Charger",price:700,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170493/b12_lq7lpo.jpg"},
{category:"Charger",name:"OnePlus 80W Combo",price:400,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170496/b13_vngsjy.jpg"},
{category:"Charger",name:"Samsung 25W Adapter",price:650,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170499/b15_zmddts.jpg"},
{category:"Charger",name:"Samsung 45W Adapter",price:1200,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170501/b16_onfyi6.jpg"},
{category:"Charger",name:"Samsung 45W Adapter + Cable",price:1500,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170504/b17_jf7pkz.jpg"},
{category:"Earbuds",name:"Boat Rockerz Band",price:600,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170520/b24_pvh6cd.jpg"},
{category:"Earbuds",name:"Boat Airdopes 151X",price:330,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170523/b25_d5vopf.jpg"},
{category:"Speaker",name:"JBL Speaker",price:1200,img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772170525/b26_t1twmc.jpg"}
];

let cart=[];

function renderProducts(list){
  const grid=document.getElementById("product-grid");
  grid.innerHTML="";
  list.forEach(p=>{
    grid.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <div class="price">₹${p.price}</div>
      <button class="cart-btn" onclick="addToCart('${p.name}')">Add to Cart</button>
    </div>`;
  });
}

function filterCategory(cat){
  if(cat==="All") renderProducts(products);
  else renderProducts(products.filter(p=>p.category===cat));
}

function addToCart(name){
  const product=products.find(p=>p.name===name);
  const exist=cart.find(i=>i.name===name);

  if(exist) exist.qty++;
  else cart.push({...product,qty:1});

  updateCart();
  showToast(name + " added to cart ✅");
}

function updateCart(){
  let total=0,count=0;
  const div=document.getElementById("cart-items");
  div.innerHTML="";

  cart.forEach(item=>{
    total+=item.price*item.qty;
    count+=item.qty;

    div.innerHTML+=`
    <div class="cart-item">
      <p>${item.name} (x${item.qty})</p>
      <button class="remove-btn" onclick="removeItem('${item.name}')">Remove</button>
    </div>`;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("cart-count").innerText=count;
}

function removeItem(name){
  cart=cart.filter(i=>i.name!==name);
  updateCart();
}

function toggleCart(){
  document.getElementById("cart-modal").classList.toggle("active");
}

/* TOAST FUNCTION */
function showToast(msg){
  const toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}

renderProducts(products);

</script>

</body>
</html>
