<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="EfZ-3WYljhHSE3kXPMt2UE6g8Jb34vZryPAmgZTjb94" />
<title>Mobile Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background-color:#0a192f;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background-color:#112240;
}

.logo{
    font-family:'Orbitron', sans-serif;
    font-size:28px;
    font-weight:700;
    color:#64ffda;
}

nav ul{
    list-style:none;
    display:flex;
    align-items:center;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.3s;
}

nav ul li a:hover{
    color:#64ffda;
}

/* LOGOUT BUTTON */
.logout-btn{
    background:#ff4d4d;
    padding:8px 18px;
    border-radius:20px;
    font-weight:600;
}

.logout-btn:hover{
    background:#ff1a1a;
    color:white;
}

/* HERO SECTION */
.hero{
    height:90vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}

.hero-text h1{
    font-size:50px;
    margin-bottom:20px;
}

.hero-text span{
    color:#64ffda;
}

.hero-text p{
    font-size:18px;
    margin-bottom:30px;
    line-height:1.6;
}

.btn{
    display:inline-block;
    padding:12px 28px;
    background:#64ffda;
    color:#0a192f;
    font-weight:600;
    border-radius:30px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:white;
    transform:scale(1.05);
}

.hero-img img{
    width:350px;
}

@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
    }
    .hero-img img{
        width:250px;
        margin-top:30px;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">Mangalmurti Mobile Shop</div>
    <ul>
        <li><a href="/index">Home</a></li>
        <li><a href="/aboutus">About Us</a></li>
        <li><a href="/contact">Contact</a></li>
        
        <li>
  <a href="#" class="logout-btn" onclick="logout()">Logout</a>
</li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Discover the <span>Latest Smartphones</span></h1>
        <p>Premium mobiles with best offers and latest technology.</p>
        <a href="/shopnow" class="btn">Shop Now</a>
    </div>

    <div class="hero-img">
        <img src="https://pngimg.com/uploads/iphone_14/iphone_14_PNG6.png" alt="Mobile Phone">
    </div>
</section>

<script>
function logout(){
    if(confirm("Do you want to log out?")){
        window.location.href = "/";
    }
}
</script>

</body>
</html>
