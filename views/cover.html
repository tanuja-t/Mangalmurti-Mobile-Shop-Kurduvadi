<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  background:#020c1b;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
}

.header h1{
  font-size:42px;
  font-weight:900;
  color:#00e5ff;
}

.header p{
  color:#cbd5e1;
}

/* FILTER */
#filter-bar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

#filter-bar button{
  padding:8px 18px;
  border:none;
  border-radius:20px;
  background:#e5e7eb;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

#filter-bar button:hover{
  background:#00e5ff;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  padding:18px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:hover{
  transform:translateY(-6px);
}

/* IMAGE */
.card img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#f1f5f9;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

/* TEXT */
.card h3{
  color:black;
  font-size:16px;
  margin:10px 0;
}

.price{
  color:#16a34a;
  font-weight:bold;
  margin-bottom:10px;
}

/* BUTTON */
.cart-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.cart-btn:hover{
  background:#00e5ff;
  color:black;
}

/* CART ICON */
#cart-icon{
  position:fixed;
  top:20px;
  right:20px;
  background:#00e5ff;
  color:black;
  padding:10px 15px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

#cart-count{
  background:red;
  color:white;
  padding:2px 6px;
  border-radius:50%;
  margin-left:5px;
}

/* CART MODAL */
#cart-modal{
  position:fixed;
  top:0;
  right:-100%;
  width:320px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:0.4s;
}

#cart-modal.active{
  right:0;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

.cart-item{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.remove-btn{
  background:red;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
  cursor:pointer;
}

/* TOAST POPUP */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00e5ff;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  font-weight:600;
  opacity:0;
  transform:translateY(50px);
  transition:0.4s;
  z-index:999;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
  .header h1{
    font-size:28px;
  }
}
</style>

let cart=[];

function renderCovers(list){
  const grid=document.getElementById("product-grid");
  grid.innerHTML="";
  list.forEach(c=>{
    grid.innerHTML+=`
    <div class="card">
      <img src="${c.img}">
      <h3>${c.name}</h3>
      <div class="price">₹${c.price}</div>
      <button class="cart-btn" onclick="addToCart('${c.name}')">Add to Cart</button>
    </div>`;
  });
}

function filterBrand(brand){
  if(brand==="All") renderCovers(covers);
  else renderCovers(covers.filter(c=>c.brand===brand));
}

function addToCart(name){
  const product=covers.find(c=>c.name===name);
  const exist=cart.find(i=>i.name===name);

  if(exist){exist.qty++;}
  else{cart.push({...product,qty:1});}

  updateCart();
  showToast(name + " added to cart ✅");
}

function showToast(msg){
  const toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}

function updateCart(){
  let total=0,count=0;
  const div=document.getElementById("cart-items");
  div.innerHTML="";

  cart.forEach(item=>{
    total+=item.price*item.qty;
    count+=item.qty;

    div.innerHTML+=`
    <div class="cart-item">
      <p>${item.name} (x${item.qty})</p>
      <button class="remove-btn" onclick="removeItem('${item.name}')">Remove</button>
    </div>`;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("cart-count").innerText=count;
}

function removeItem(name){
  cart=cart.filter(i=>i.name!==name);
  updateCart();
}

function toggleCart(){
  document.getElementById("cart-modal").classList.toggle("active");
}

renderCovers(covers);

</script>
